<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 800 460">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a7a8e"/>
    </marker>
    <marker id="arr-dispatch" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f4569d"/>
    </marker>
  </defs>

  <!-- /pre-pr skill node -->
  <rect x="200" y="20" width="400" height="65" rx="8" fill="#191621" stroke="rgba(244, 86, 157, 0.3)" stroke-width="1.5"/>
  <text x="400" y="46" text-anchor="middle" fill="#7a7a8e" font-family="Rubik, system-ui, sans-serif" font-size="12" font-weight="500" letter-spacing="1">SKILL</text>
  <text x="400" y="70" text-anchor="middle" fill="#f4569d" font-family="ui-monospace, Cascadia Code, monospace" font-size="20" font-weight="600">/pre-pr</text>

  <!-- Column 1: Lint -->
  <rect x="20" y="135" width="170" height="275" rx="8" fill="rgba(25, 22, 33, 0.4)" stroke="rgba(14, 210, 247, 0.08)" stroke-width="1"/>
  <rect x="40" y="155" width="130" height="55" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="105" y="189" text-anchor="middle" fill="#0fb6d6" font-family="Rubik, system-ui, sans-serif" font-size="17" font-weight="600">Lint</text>
  <rect x="40" y="330" width="130" height="60" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="105" y="355" text-anchor="middle" fill="#bebebe" font-family="Rubik, system-ui, sans-serif" font-size="16" font-weight="500">CLI</text>
  <text x="105" y="376" text-anchor="middle" fill="#7a7a8e" font-family="ui-monospace, Cascadia Code, monospace" font-size="12">lint-fix + lint</text>

  <!-- Column 2: Unit tests -->
  <rect x="210" y="135" width="170" height="275" rx="8" fill="rgba(25, 22, 33, 0.4)" stroke="rgba(14, 210, 247, 0.08)" stroke-width="1"/>
  <rect x="230" y="155" width="130" height="55" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="295" y="189" text-anchor="middle" fill="#0fb6d6" font-family="Rubik, system-ui, sans-serif" font-size="17" font-weight="600">Unit tests</text>
  <rect x="230" y="330" width="130" height="60" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="295" y="355" text-anchor="middle" fill="#bebebe" font-family="Rubik, system-ui, sans-serif" font-size="16" font-weight="500">CLI</text>
  <text x="295" y="376" text-anchor="middle" fill="#7a7a8e" font-family="ui-monospace, Cascadia Code, monospace" font-size="12">lein test</text>

  <!-- Column 3: Integration -->
  <rect x="400" y="135" width="170" height="275" rx="8" fill="rgba(25, 22, 33, 0.4)" stroke="rgba(14, 210, 247, 0.08)" stroke-width="1"/>
  <rect x="420" y="155" width="130" height="55" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="485" y="189" text-anchor="middle" fill="#0fb6d6" font-family="Rubik, system-ui, sans-serif" font-size="17" font-weight="600">Integration</text>
  <rect x="420" y="330" width="130" height="60" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="485" y="355" text-anchor="middle" fill="#bebebe" font-family="Rubik, system-ui, sans-serif" font-size="16" font-weight="500">CLI</text>
  <text x="485" y="376" text-anchor="middle" fill="#7a7a8e" font-family="ui-monospace, Cascadia Code, monospace" font-size="12">lein integration</text>

  <!-- Column 4: Code review -->
  <rect x="590" y="135" width="190" height="275" rx="8" fill="rgba(25, 22, 33, 0.4)" stroke="rgba(14, 210, 247, 0.08)" stroke-width="1"/>
  <rect x="610" y="155" width="150" height="55" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="685" y="189" text-anchor="middle" fill="#0fb6d6" font-family="Rubik, system-ui, sans-serif" font-size="17" font-weight="600">Code review</text>
  <rect x="610" y="330" width="150" height="60" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="685" y="355" text-anchor="middle" fill="#bebebe" font-family="Rubik, system-ui, sans-serif" font-size="16" font-weight="500">MCP</text>
  <text x="685" y="376" text-anchor="middle" fill="#7a7a8e" font-family="ui-monospace, Cascadia Code, monospace" font-size="12">search + read</text>

  <!-- Dispatch arrows: skill → sub-agents -->
  <line x1="310" y1="85" x2="105" y2="150" stroke="#f4569d" stroke-width="1.5" marker-end="url(#arr-dispatch)"/>
  <line x1="350" y1="85" x2="295" y2="150" stroke="#f4569d" stroke-width="1.5" marker-end="url(#arr-dispatch)"/>
  <line x1="450" y1="85" x2="485" y2="150" stroke="#f4569d" stroke-width="1.5" marker-end="url(#arr-dispatch)"/>
  <line x1="490" y1="85" x2="685" y2="150" stroke="#f4569d" stroke-width="1.5" marker-end="url(#arr-dispatch)"/>

  <!-- "dispatch" label — centered above fan-out -->
  <text x="400" y="110" text-anchor="middle" fill="#f4569d" font-family="Rubik, system-ui, sans-serif" font-size="13" font-style="italic" opacity="0.8">dispatch</text>

  <!-- Sub-agent → tool arrows -->
  <line x1="105" y1="210" x2="105" y2="325" stroke="#7a7a8e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="295" y1="210" x2="295" y2="325" stroke="#7a7a8e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="485" y1="210" x2="485" y2="325" stroke="#7a7a8e" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="685" y1="210" x2="685" y2="325" stroke="#7a7a8e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Legend -->
  <text x="400" y="440" text-anchor="middle" fill="#7a7a8e" font-family="Rubik, system-ui, sans-serif" font-size="13">4 sub-agents run in parallel — the skill narrates progress and synthesizes results</text>
</svg>
