<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -30 760 680" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .group-label { font-size: 14px; font-weight: 600; fill: #ccc; }
    .node-title { font-size: 15px; font-weight: 700; fill: #fff; }
    .node-desc { font-size: 12px; fill: #ccc; }
    .edge-label { font-size: 11px; fill: #999; font-style: italic; }
  </style>

  <!-- Non-deterministic group -->
  <rect x="0" y="0" width="700" height="200" rx="12" fill="none" stroke="#a882ff" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="20" y="-8" class="group-label" fill="#a882ff">🧠 Non-deterministic — shapes thinking</text>

  <!-- Deterministic group -->
  <rect x="0" y="440" width="700" height="200" rx="12" fill="none" stroke="#e8a838" stroke-width="2" stroke-dasharray="8,4" opacity="0.6"/>
  <text x="20" y="432" class="group-label" fill="#e8a838">⚙️ Deterministic — executes and enforces</text>

  <!-- Rules node -->
  <rect x="50" y="50" width="250" height="100" rx="8" fill="#2d2244" stroke="#a882ff" stroke-width="2"/>
  <text x="175" y="90" text-anchor="middle" class="node-title">Rules</text>
  <text x="175" y="115" text-anchor="middle" class="node-desc">Passive knowledge — absorbed, not called</text>

  <!-- Skills node -->
  <rect x="400" y="50" width="250" height="100" rx="8" fill="#2d2244" stroke="#a882ff" stroke-width="2"/>
  <text x="525" y="90" text-anchor="middle" class="node-title">Skills</text>
  <text x="525" y="115" text-anchor="middle" class="node-desc">Workflow brain — invoked, orchestrates</text>

  <!-- Agent node -->
  <rect x="250" y="250" width="200" height="100" rx="8" fill="#1a3a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="350" y="290" text-anchor="middle" class="node-title">Agent</text>
  <text x="350" y="315" text-anchor="middle" class="node-desc">Plans, decides, calls tools</text>

  <!-- Hooks node -->
  <rect x="50" y="490" width="240" height="100" rx="8" fill="#3a2a1a" stroke="#e8a838" stroke-width="2"/>
  <text x="170" y="530" text-anchor="middle" class="node-title">Hooks</text>
  <text x="170" y="555" text-anchor="middle" class="node-desc">Structural enforcement —</text>
  <text x="170" y="570" text-anchor="middle" class="node-desc">intercepts tool calls</text>

  <!-- Tools node -->
  <rect x="400" y="490" width="250" height="100" rx="8" fill="#3a2a1a" stroke="#e8a838" stroke-width="2"/>
  <text x="525" y="530" text-anchor="middle" class="node-title">Tools</text>
  <text x="525" y="555" text-anchor="middle" class="node-desc">Bash, Write, Read, MCP, …</text>

  <!-- Arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#888"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a882ff"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4ade80"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e8a838"/>
    </marker>
  </defs>

  <!-- Rules → Agent (shape) -->
  <path d="M 175 150 C 175 200, 310 200, 310 250" fill="none" stroke="#a882ff" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrow-purple)"/>
  <text x="210" y="205" class="edge-label" fill="#a882ff">shape</text>

  <!-- Skills → Agent (direct) -->
  <path d="M 525 150 C 525 200, 390 200, 390 250" fill="none" stroke="#a882ff" stroke-width="1.5" marker-end="url(#arrow-purple)"/>
  <text x="475" y="205" class="edge-label" fill="#a882ff">direct</text>

  <!-- Agent → Tools (calls) -->
  <path d="M 350 350 C 350 420, 525 420, 525 490" fill="none" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="420" y="420" class="edge-label" fill="#4ade80">calls</text>

  <!-- Hooks → Tools (intercept) -->
  <path d="M 290 540 L 400 540" fill="none" stroke="#e8a838" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="330" y="530" class="edge-label" fill="#e8a838">intercept</text>
</svg>
