<html lang="en"><head><meta charset="utf-8" /><meta content="width=device-width, initial-scale=1" name="viewport" /><meta content="dark" name="color-scheme" /><title>João Lopes</title><meta content="Writing about AI-first engineering" name="description" /><link href="https://fonts.googleapis.com" rel="preconnect" /><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" /><link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&amp;display=swap" rel="stylesheet" /><link href="/css/style.css" rel="stylesheet" /><link href="/favicon.svg" rel="icon" type="image/svg+xml" /><link href="/feed.xml" rel="alternate" title="João Lopes" type="application/rss+xml" /><link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/dracula.min.css" rel="stylesheet" /><script defer="defer" src="/js/main.js"></script></head><body><header><nav><a class="site-logo" href="/"><svg aria-hidden="true" class="logo" height="40" viewBox="0 0 32 32" width="40"><path class="logo-path" d="M16 16c-2-2.5-4-4.5-6-4.5a4.5 4.5 0 1 0 0 9c2 0 4-2 6-4.5zm0 0c2 2.5 4 4.5 6 4.5a4.5 4.5 0 1 0 0-9c-2 0-4 2-6 4.5z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>João Lopes</a><button aria-controls="nav-menu" aria-expanded="false" aria-label="Menu" class="nav-toggle" id="nav-toggle"><span aria-hidden="true" class="hamburger-icon">☰</span></button><span class="nav-links" id="nav-menu"><a href="/">Posts</a><a href="/tags/">Tags</a><a href="/glossary/">Glossary</a><a href="/diagrams/">Diagrams</a><a href="/about/">About</a><a href="/feed.xml">RSS</a></span></nav></header><main><div class="diagram-page"><h1 class="diagram-title">Hooks Lifecycle</h1><div class="diagram-full"><svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 760 900">
  <defs>
    <marker id="hl-arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a7a8e"/>
    </marker>
    <marker id="hl-arr-pink" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f4569d"/>
    </marker>
    <marker id="hl-arr-cyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0fb6d6"/>
    </marker>
  </defs>

  <!-- Agent node -->
  <rect x="250" y="20" width="260" height="100" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.3)" stroke-width="2"/>
  <text x="380" y="62" text-anchor="middle" class="svg-heading svg-accent">Agent</text>
  <text x="380" y="88" text-anchor="middle" class="svg-body svg-fg">Decides to call a tool</text>

  <!-- Agent → PreToolUse -->
  <line x1="380" y1="120" x2="380" y2="180" stroke="#7a7a8e" stroke-width="2" marker-end="url(#hl-arr)"/>

  <!-- PreToolUse node -->
  <rect x="250" y="180" width="260" height="100" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="380" y="222" text-anchor="middle" class="svg-heading svg-fg">PreToolUse</text>
  <text x="380" y="248" text-anchor="middle" class="svg-sub svg-muted">Annotate · Block · Validate</text>

  <!-- PreToolUse left → Blocked top -->
  <path d="M 250,230 C 170,230 125,280 125,320" fill="none" stroke="#f4569d" stroke-width="1.5" marker-end="url(#hl-arr-pink)"/>
  <text x="168" y="245" text-anchor="middle" class="svg-label svg-pink">block</text>

  <!-- PreToolUse right → Annotated top -->
  <path d="M 510,230 C 590,230 635,280 635,320" fill="none" stroke="#0fb6d6" stroke-width="1.5" marker-end="url(#hl-arr-cyan)"/>
  <text x="592" y="245" text-anchor="middle" class="svg-label svg-accent">allow + context</text>

  <!-- PreToolUse bottom → Tool call -->
  <line x1="380" y1="280" x2="380" y2="440" stroke="#7a7a8e" stroke-width="2" marker-end="url(#hl-arr)"/>
  <text x="390" y="368" class="svg-label svg-muted">pass</text>

  <!-- Blocked node -->
  <rect x="20" y="320" width="210" height="100" rx="8" fill="#191621" stroke="rgba(244, 86, 157, 0.4)" stroke-width="1.5"/>
  <text x="125" y="362" text-anchor="middle" class="svg-heading svg-accent">Blocked</text>
  <text x="125" y="388" text-anchor="middle" class="svg-body svg-muted">Wrong command denied</text>

  <!-- Annotated node -->
  <rect x="530" y="320" width="210" height="100" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.3)" stroke-width="1.5"/>
  <text x="635" y="362" text-anchor="middle" class="svg-heading svg-accent">Annotated</text>
  <text x="635" y="384" text-anchor="middle" class="svg-body svg-muted">Context injected</text>
  <text x="635" y="404" text-anchor="middle" class="svg-body svg-muted">Tool still runs</text>

  <!-- Tool call node -->
  <rect x="250" y="460" width="260" height="100" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="380" y="502" text-anchor="middle" class="svg-heading svg-fg">Tool call</text>
  <text x="380" y="528" text-anchor="middle" class="svg-sub svg-muted">Bash · Write · Read · MCP</text>

  <!-- Tool call → PostToolUse -->
  <line x1="380" y1="560" x2="380" y2="620" stroke="#7a7a8e" stroke-width="2" marker-end="url(#hl-arr)"/>
  <text x="390" y="596" class="svg-label svg-muted">result</text>

  <!-- PostToolUse node -->
  <rect x="250" y="620" width="260" height="100" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="380" y="662" text-anchor="middle" class="svg-heading svg-fg">PostToolUse</text>
  <text x="380" y="688" text-anchor="middle" class="svg-sub svg-muted">Observe · Log · Update UI</text>

  <!-- PostToolUse → Side effect -->
  <line x1="380" y1="720" x2="380" y2="780" stroke="#7a7a8e" stroke-width="2" marker-end="url(#hl-arr)"/>

  <!-- Side effect node -->
  <rect x="250" y="780" width="260" height="100" rx="8" fill="#191621" stroke="rgba(244, 86, 157, 0.4)" stroke-width="1.5"/>
  <text x="380" y="822" text-anchor="middle" class="svg-heading svg-accent">Side effect</text>
  <text x="380" y="848" text-anchor="middle" class="svg-body svg-muted">Update terminal · Log event</text>
</svg>
</div><div class="diagram-transcript"><p>Hooks lifecycle: Agent → PreToolUse (block / annotate / pass) → Tool call → PostToolUse → Side effect</p></div></div></main><footer><p>© 2026 <a href="https://github.com/j0a0m4" rel="noopener noreferrer" target="_blank">João Lopes</a></p><p>Theme inspired by <a href="https://github.com/bennyxguo/Obsidian-Obsidianite" rel="noopener noreferrer" target="_blank">Obsidianite</a></p></footer></body></html>
