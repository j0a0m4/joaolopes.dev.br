name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'glossary/**'
      - 'pages/**'
      - 'src/**'
      - 'resources/**'
      - 'assets/**'
      - 'config.edn'
      - 'deps.edn'
      - 'shadow-cljs.edn'
      - 'package.json'

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            .cpcache
          key: clj-${{ hashFiles('deps.edn') }}

      - name: Install Node deps
        run: npm ci

      - name: Run unit tests
        run: clojure -M:test

      - name: Compile ClojureScript
        run: clojure -M:shadow compile app

      - name: Build site
        run: clojure -M:build

      - name: Preserve preview if exists
        run: |
          git fetch origin gh-pages --depth=1 || exit 0
          git checkout origin/gh-pages -- preview || true

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: joaolopes.dev.br
