name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'posts/**'
      - 'glossary/**'
      - 'pages/**'
      - 'src/**'
      - 'resources/**'
      - 'assets/**'
      - 'config.edn'
      - 'deps.edn'
      - 'shadow-cljs.edn'
      - 'package.json'

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            .cpcache
          key: clj-v2-${{ hashFiles('deps.edn') }}

      - name: Cache npm deps
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}

      - name: Install Node deps
        run: npm ci

      - name: Install clj-kondo
        run: |
          curl -sLO https://raw.githubusercontent.com/clj-kondo/clj-kondo/master/script/install-clj-kondo
          chmod +x install-clj-kondo
          sudo ./install-clj-kondo

      - name: Lint Clojure
        run: clj-kondo --lint src test

      - name: Lint JS
        run: npx eslint test/e2e-playwright/

      - name: Check Clojure formatting
        run: clojure -M:cljfmt check

      - name: Check JS formatting
        run: npx prettier --check test/e2e-playwright/

      - name: Run unit tests
        run: clojure -M:unit

      - name: Run integration tests
        run: clojure -M:integration

      - name: Compile ClojureScript
        run: clojure -M:shadow compile app

      - name: Build site
        run: clojure -M:build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run e2e tests
        run: npx playwright test --reporter=list

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-deploy
          path: public/
          retention-days: 1

  deploy:
    needs: regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-deploy
          path: public/

      - name: Preserve preview if exists
        run: |
          git fetch origin gh-pages --depth=1 || exit 0
          git checkout origin/gh-pages -- preview || true

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          cname: joaolopes.dev.br
