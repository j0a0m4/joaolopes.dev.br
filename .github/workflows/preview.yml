name: preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'posts/**'
      - 'src/**'
      - 'resources/**'
      - 'assets/**'
      - 'deps.edn'
      - 'shadow-cljs.edn'
      - 'package.json'

permissions:
  contents: write
  pull-requests: write

jobs:

  build:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            .cpcache
          key: clj-${{ hashFiles('deps.edn') }}
      - name: Install Node deps
        run: npm ci
      - name: Compile ClojureScript
        run: clojure -M:shadow compile app
      - name: Build site
        run: clojure -M:build
        env:
          BASE_PATH: /preview
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: public/
          retention-days: 1

  preview:
    if: github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: public/
      - name: Stage preview
        run: |
          mkdir -p preview
          cp -r public/* preview/
      - name: Deploy preview
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./preview
          destination_dir: preview
          cname: joaolopes.dev.br
      - name: Comment preview link
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: preview
          message: |
            **Preview live:** https://joaolopes.dev.br/preview/
            _Commit: `${{ github.event.pull_request.head.sha }}`_

  e2e-tests:
    if: github.event.action != 'closed'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            .cpcache
          key: clj-${{ hashFiles('deps.edn') }}
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: public/
      - name: Install ChromeDriver
        run: |
          sudo apt-get install -y chromium-driver
          chromedriver --version
      - name: Run e2e tests
        run: clojure -M:e2e

  teardown:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: gh-pages
      - name: Remove preview
        run: |
          if [ -d preview ]; then
            git rm -rf preview
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "Remove PR preview"
            git push
          fi
