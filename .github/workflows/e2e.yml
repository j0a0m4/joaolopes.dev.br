name: e2e

on:
  pull_request:
    paths:
      - 'posts/**'
      - 'src/**'
      - 'resources/**'
      - 'assets/**'
      - 'test/e2e/**'
      - 'test/aux/**'
      - 'deps.edn'
      - 'shadow-cljs.edn'
      - 'package.json'

permissions:
  contents: read

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            .cpcache
          key: clj-v2-${{ hashFiles('deps.edn') }}
      - name: Cache npm deps
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('package-lock.json') }}
      - name: Install Node deps
        run: npm ci
      - name: Warm all Clojure deps (build + e2e)
        run: clojure -P -M:build:e2e:shadow
      - name: Compile ClojureScript
        run: clojure -M:shadow compile app
      - name: Build site
        run: clojure -M:build
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-e2e
          path: public/
          retention-days: 1

  e2e-tests:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            .cpcache
          key: clj-v2-${{ hashFiles('deps.edn') }}
      - name: Download site artifact
        uses: actions/download-artifact@v4
        with:
          name: site-e2e
          path: public/
      - name: Get Chrome version
        id: chrome-version
        run: echo "major=$(google-chrome --version | grep -oE '[0-9]+' | head -1)" >> $GITHUB_OUTPUT
      - name: Cache ChromeDriver
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/node_modules/chromedriver
          key: chromedriver-${{ steps.chrome-version.outputs.major }}-${{ runner.os }}
      - name: Install matching ChromeDriver
        run: |
          npm install -g chromedriver
          chromedriver --version
      - name: Run e2e tests
        run: clojure -M:e2e
