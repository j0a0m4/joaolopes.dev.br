name: unit-tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'test/blog/unit/**'
      - 'deps.edn'

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeLaGuardo/setup-clojure@13.1
        with:
          cli: latest
      - name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            .cpcache
          key: clj-${{ hashFiles('deps.edn') }}
      - name: Run unit tests
        run: clojure -M:unit
