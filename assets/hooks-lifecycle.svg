<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 1040 900">
  <defs>
    <marker id="hl-arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a7a8e"/>
    </marker>
    <marker id="hl-arr-pink" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f4569d"/>
    </marker>
    <marker id="hl-arr-cyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0fb6d6"/>
    </marker>
  </defs>

  <!-- Agent node -->
  <rect x="380" y="20" width="280" height="100" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.3)" stroke-width="2"/>
  <text x="520" y="62" text-anchor="middle" fill="#0fb6d6" font-family="Rubik, system-ui, sans-serif" font-size="20" font-weight="600">Agent</text>
  <text x="520" y="88" text-anchor="middle" fill="#bebebe" font-family="Rubik, system-ui, sans-serif" font-size="14">Decides to call a tool</text>

  <!-- Agent → PreToolUse -->
  <line x1="520" y1="120" x2="520" y2="180" stroke="#7a7a8e" stroke-width="2" marker-end="url(#hl-arr)"/>

  <!-- PreToolUse node -->
  <rect x="380" y="180" width="280" height="100" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="520" y="222" text-anchor="middle" fill="#bebebe" font-family="Rubik, system-ui, sans-serif" font-size="20" font-weight="600">PreToolUse</text>
  <text x="520" y="248" text-anchor="middle" fill="#7a7a8e" font-family="Rubik, system-ui, sans-serif" font-size="14">Annotate · Block · Validate</text>

  <!-- PreToolUse left → Blocked -->
  <path d="M 380,230 C 300,230 300,340 300,390" fill="none" stroke="#f4569d" stroke-width="1.5" marker-end="url(#hl-arr-pink)"/>
  <text x="242" y="295" text-anchor="end" fill="#f4569d" font-family="Rubik, system-ui, sans-serif" font-size="13" font-style="italic">block</text>

  <!-- PreToolUse right → Annotated -->
  <path d="M 660,230 C 740,230 740,340 740,390" fill="none" stroke="#0fb6d6" stroke-width="1.5" marker-end="url(#hl-arr-cyan)"/>
  <text x="755" y="255" text-anchor="start" fill="#0fb6d6" font-family="Rubik, system-ui, sans-serif" font-size="13" font-style="italic">allow + context</text>

  <!-- PreToolUse bottom → Tool call -->
  <line x1="520" y1="280" x2="520" y2="460" stroke="#7a7a8e" stroke-width="2" marker-end="url(#hl-arr)"/>
  <text x="530" y="378" fill="#7a7a8e" font-family="Rubik, system-ui, sans-serif" font-size="13" font-style="italic">pass</text>

  <!-- Blocked node -->
  <rect x="20" y="340" width="280" height="100" rx="8" fill="#191621" stroke="rgba(244, 86, 157, 0.4)" stroke-width="1.5"/>
  <text x="160" y="382" text-anchor="middle" fill="#f4569d" font-family="Rubik, system-ui, sans-serif" font-size="20" font-weight="600">Blocked</text>
  <text x="160" y="408" text-anchor="middle" fill="#7a7a8e" font-family="Rubik, system-ui, sans-serif" font-size="14">Wrong command denied</text>

  <!-- Annotated node -->
  <rect x="740" y="340" width="280" height="100" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.3)" stroke-width="1.5"/>
  <text x="880" y="382" text-anchor="middle" fill="#0fb6d6" font-family="Rubik, system-ui, sans-serif" font-size="20" font-weight="600">Annotated</text>
  <text x="880" y="404" text-anchor="middle" fill="#7a7a8e" font-family="Rubik, system-ui, sans-serif" font-size="14">Context injected</text>
  <text x="880" y="424" text-anchor="middle" fill="#7a7a8e" font-family="Rubik, system-ui, sans-serif" font-size="14">Tool still runs</text>

  <!-- Tool call node -->
  <rect x="380" y="460" width="280" height="100" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="520" y="502" text-anchor="middle" fill="#bebebe" font-family="Rubik, system-ui, sans-serif" font-size="20" font-weight="600">Tool call</text>
  <text x="520" y="528" text-anchor="middle" fill="#7a7a8e" font-family="Rubik, system-ui, sans-serif" font-size="14">Bash · Write · Read · MCP</text>

  <!-- Tool call → PostToolUse -->
  <line x1="520" y1="560" x2="520" y2="620" stroke="#7a7a8e" stroke-width="2" marker-end="url(#hl-arr)"/>
  <text x="530" y="596" fill="#7a7a8e" font-family="Rubik, system-ui, sans-serif" font-size="13" font-style="italic">result</text>

  <!-- PostToolUse node -->
  <rect x="380" y="620" width="280" height="100" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="520" y="662" text-anchor="middle" fill="#bebebe" font-family="Rubik, system-ui, sans-serif" font-size="20" font-weight="600">PostToolUse</text>
  <text x="520" y="688" text-anchor="middle" fill="#7a7a8e" font-family="Rubik, system-ui, sans-serif" font-size="14">Observe · Log · Update UI</text>

  <!-- PostToolUse → Side effect -->
  <line x1="520" y1="720" x2="520" y2="780" stroke="#7a7a8e" stroke-width="2" marker-end="url(#hl-arr)"/>

  <!-- Side effect node -->
  <rect x="380" y="780" width="280" height="100" rx="8" fill="#191621" stroke="rgba(244, 86, 157, 0.4)" stroke-width="1.5"/>
  <text x="520" y="822" text-anchor="middle" fill="#f4569d" font-family="Rubik, system-ui, sans-serif" font-size="20" font-weight="600">Side effect</text>
  <text x="520" y="848" text-anchor="middle" fill="#7a7a8e" font-family="Rubik, system-ui, sans-serif" font-size="14">Update terminal · Log event</text>
</svg>
