    <path d="M0,0 L0,6 L8,3 z" fill="#0fb6d6"/>
  </marker>
  <marker id="canonic-api-arr-pink" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
    <path d="M0,0 L0,6 L8,3 z" fill="#f4569d"/>
  </marker>
</defs>
<g>
  <rect x="18.54" y="27.80" width="111.22" height="60.24" rx="8" fill="var(--bg-alt)" stroke="rgba(14,210,247,0.15)" stroke-width="1.5"/>
  <text x="74.15" y="48.89" class="svg-body" text-anchor="middle">Rule</text>
  <text x="74.15" y="57.23" class="svg-sub" text-anchor="middle">`:name` `:title` `:severity`</text>
  <text x="74.15" y="65.57" class="svg-sub" text-anchor="middle">`:description` `:rationale`</text>
  <text x="74.15" y="73.91" class="svg-sub" text-anchor="middle">`:details` `:example`</text>
  <text x="74.15" y="82.26" class="svg-sub" text-anchor="middle">severity: critical | standard | guidance</text>
</g>
<g>
  <rect x="18.54" y="97.32" width="111.22" height="60.24" rx="8" fill="var(--bg-alt)" stroke="rgba(14,210,247,0.15)" stroke-width="1.5"/>
  <text x="74.15" y="118.40" class="svg-body" text-anchor="middle">Ruleset</text>
  <text x="74.15" y="126.74" class="svg-sub" text-anchor="middle">`:name` `:description`</text>
  <text x="74.15" y="135.09" class="svg-sub" text-anchor="middle">`:rules` — ordered keyword refs</text>
  <text x="74.15" y="143.43" class="svg-sub" text-anchor="middle">`:code-prefix` — e.g. "AB"</text>
  <text x="74.15" y="151.77" class="svg-sub" text-anchor="middle">`:scopes` — glob patterns</text>
</g>
<g>
  <rect x="18.54" y="166.83" width="111.22" height="78.78" rx="8" fill="var(--bg-alt)" stroke="rgba(14,210,247,0.15)" stroke-width="1.5"/>
  <text x="74.15" y="194.40" class="svg-body" text-anchor="middle">Profile</text>
  <text x="74.15" y="202.74" class="svg-sub" text-anchor="middle">`:format` `:includes` `:targets`</text>
  <text x="74.15" y="211.09" class="svg-sub" text-anchor="middle">`:disabled`</text>
  <text x="74.15" y="219.43" class="svg-sub" text-anchor="middle">`:render {:compose {} :apply {}}`</text>
  <text x="74.15" y="227.77" class="svg-sub" text-anchor="middle">format: claude-md | agents-md | cursor-mdc</text>
</g>
<g>
  <rect x="176.10" y="23.17" width="120.49" height="92.68" rx="8" fill="var(--bg-alt)" stroke="rgba(14,210,247,0.15)" stroke-width="1.5"/>
  <text x="236.34" y="55.61" class="svg-body" text-anchor="middle">management</text>
  <text x="236.34" y="63.95" class="svg-sub" text-anchor="middle">`create &lt;name&gt; --format F`</text>
  <text x="236.34" y="72.29" class="svg-sub" text-anchor="middle">`list` · `show &lt;name&gt;` · `remove &lt;name&gt;`</text>
  <text x="236.34" y="80.63" class="svg-sub" text-anchor="middle">`include &lt;n&gt; ruleset &lt;rs&gt;`</text>
  <text x="236.34" y="88.98" class="svg-sub" text-anchor="middle">`exclude &lt;n&gt; &lt;rs&gt;`</text>
  <text x="236.34" y="97.32" class="svg-sub" text-anchor="middle">`disable &lt;n&gt; &lt;rs&gt; &lt;rule&gt;`</text>
  <text x="236.34" y="105.66" class="svg-sub" text-anchor="middle">`enable  &lt;n&gt; &lt;rs&gt; &lt;rule&gt;`</text>
</g>
<g>
  <rect x="329.02" y="27.80" width="111.22" height="106.59" rx="8" fill="var(--bg-alt)" stroke="rgba(14,210,247,0.15)" stroke-width="1.5"/>
  <text x="384.63" y="65.11" class="svg-body" text-anchor="middle">compose</text>
  <text x="384.63" y="73.45" class="svg-sub" text-anchor="middle">`target &lt;n&gt; &lt;path&gt; [--strategy]`</text>
  <text x="384.63" y="81.79" class="svg-sub" text-anchor="middle">`untarget &lt;n&gt; &lt;path&gt;`</text>
  <text x="384.63" y="90.13" class="svg-sub" text-anchor="middle">strategies: copy · symlink · import</text>
  <text x="384.63" y="98.48" class="svg-sub" text-anchor="middle">`compose &lt;name&gt;`</text>
  <text x="384.63" y="106.82" class="svg-sub" text-anchor="middle">`compose &lt;name&gt; --dry-run`</text>
  <text x="384.63" y="115.16" class="svg-sub" text-anchor="middle">resolve → render → distribute</text>
</g>
<g>
  <rect x="454.15" y="18.54" width="125.12" height="120.49" rx="8" fill="var(--bg-alt)" stroke="rgba(14,210,247,0.15)" stroke-width="1.5"/>
  <text x="516.71" y="60.71" class="svg-body" text-anchor="middle">render :compose</text>
  <text x="516.71" y="69.05" class="svg-sub" text-anchor="middle">default: all fields</text>
  <text x="516.71" y="77.39" class="svg-sub" text-anchor="middle">fields: title · description</text>
  <text x="516.71" y="85.73" class="svg-sub" text-anchor="middle">        details · example · rationale</text>
  <text x="516.71" y="94.07" class="svg-sub" text-anchor="middle">`render &lt;n&gt; compose &lt;sev&gt; &lt;fields&gt;`</text>
  <text x="516.71" y="102.41" class="svg-sub" text-anchor="middle">`render-override &lt;n&gt; compose &lt;rule&gt; &lt;fields&gt;`</text>
  <text x="516.71" y="110.76" class="svg-sub" text-anchor="middle">`render-clear &lt;n&gt;`</text>
</g>
<g>
  <rect x="329.02" y="166.83" width="111.22" height="92.68" rx="8" fill="var(--bg-alt)" stroke="rgba(14,210,247,0.15)" stroke-width="1.5"/>
  <text x="384.63" y="199.27" class="svg-body" text-anchor="middle">apply</text>
  <text x="384.63" y="207.61" class="svg-sub" text-anchor="middle">`apply &lt;name&gt;`</text>
  <text x="384.63" y="215.95" class="svg-sub" text-anchor="middle">resolve → render compact → stdout</text>
  <text x="384.63" y="224.29" class="svg-sub" text-anchor="middle">agent injects on demand</text>
  <text x="384.63" y="232.63" class="svg-sub" text-anchor="middle">no restart needed</text>
</g>
<g>
  <rect x="454.15" y="162.20" width="125.12" height="101.95" rx="8" fill="var(--bg-alt)" stroke="rgba(14,210,247,0.15)" stroke-width="1.5"/>
  <text x="516.71" y="197.88" class="svg-body" text-anchor="middle">render :apply</text>
  <text x="516.71" y="206.22" class="svg-sub" text-anchor="middle">default: [:title :description]</text>
  <text x="516.71" y="214.56" class="svg-sub" text-anchor="middle">`render &lt;n&gt; apply &lt;sev&gt; &lt;fields&gt;`</text>
  <text x="516.71" y="222.90" class="svg-sub" text-anchor="middle">`render-override &lt;n&gt; apply &lt;rule&gt; &lt;fields&gt;`</text>
  <text x="516.71" y="231.24" class="svg-sub" text-anchor="middle">`render-clear &lt;n&gt;`</text>
</g>
