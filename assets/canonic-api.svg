  <text x="681.22" y="67.89" class="svg-sub" text-anchor="middle">CLAUDE.md · .cursorrules · agents.md</text>
  <text x="681.22" y="76.23" class="svg-sub" text-anchor="middle">session-start · requires restart</text>
</g>
