<svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 820 240">
  <defs>
    <marker id="pl-arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a7a8e"/>
    </marker>
    <marker id="pl-arr-pink" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f4569d"/>
    </marker>
  </defs>

  <!-- Infrastructure envelope -->
  <rect x="10" y="10" width="800" height="220" rx="12" fill="none" stroke="#1a4a55" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="410" y="32" text-anchor="middle" class="svg-sub svg-muted">infrastructure: rules · hooks · vault</text>

  <!-- Describe node -->
  <rect x="40" y="50" width="220" height="90" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="150" y="88" text-anchor="middle" class="svg-heading svg-accent">Describe</text>
  <text x="150" y="112" text-anchor="middle" class="svg-sub svg-muted">Tell Claude what you want</text>

  <!-- Review node -->
  <rect x="310" y="50" width="220" height="90" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="420" y="84" text-anchor="middle" class="svg-heading svg-accent">Review</text>
  <text x="420" y="104" text-anchor="middle" class="svg-sub svg-muted">/tech-writer flags claims</text>
  <text x="420" y="122" text-anchor="middle" class="svg-sub svg-muted">/revise fixes structure</text>

  <!-- Publish node -->
  <rect x="580" y="50" width="220" height="90" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="690" y="88" text-anchor="middle" class="svg-heading svg-accent">Publish</text>
  <text x="690" y="112" text-anchor="middle" class="svg-sub svg-muted">/publish builds, PRs, deploys</text>

  <!-- Describe → Review arrow -->
  <line x1="260" y1="95" x2="305" y2="95" stroke="#7a7a8e" stroke-width="2" marker-end="url(#pl-arr)"/>

  <!-- Review → Publish arrow -->
  <line x1="530" y1="95" x2="575" y2="95" stroke="#7a7a8e" stroke-width="2" marker-end="url(#pl-arr)"/>

  <!-- Publish → Describe return arrow (curves below) -->
  <path d="M 690 140 L 690 180 Q 690 200 670 200 L 170 200 Q 150 200 150 180 L 150 140"
        fill="none" stroke="#f4569d" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#pl-arr-pink)"/>
  <text x="420" y="217" text-anchor="middle" class="svg-label svg-pink">repeat</text>
</svg>
