<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8" /><meta content="width=device-width, initial-scale=1" name="viewport" /><meta content="dark" name="color-scheme" /><title>João Lopes</title><meta content="Writing about AI-first engineering" name="description" /><link href="https://fonts.googleapis.com" rel="preconnect" /><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" /><link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&amp;display=swap" rel="stylesheet" /><link href="/css/style.css" rel="stylesheet" /><link href="/favicon.svg" rel="icon" type="image/svg+xml" /><link href="/feed.xml" rel="alternate" title="João Lopes" type="application/rss+xml" /><link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/dracula.min.css" rel="stylesheet" /><script defer="defer" src="/js/main.js"></script></head><body><header><nav><a class="site-logo" href="/"><svg aria-hidden="true" class="logo" height="40" viewBox="0 0 32 32" width="40"><path class="logo-path" d="M16 16c-2-2.5-4-4.5-6-4.5a4.5 4.5 0 1 0 0 9c2 0 4-2 6-4.5zm0 0c2 2.5 4 4.5 6 4.5a4.5 4.5 0 1 0 0-9c-2 0-4 2-6 4.5z" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path></svg>João Lopes</a><button aria-controls="nav-menu" aria-expanded="false" aria-label="Menu" class="nav-toggle" id="nav-toggle"><span aria-hidden="true" class="hamburger-icon">☰</span></button><span class="nav-links" id="nav-menu"><a href="/">Posts</a><a href="/tags/">Tags</a><a href="/glossary/">Glossary</a><a href="/diagrams/">Diagrams</a><a href="/about/">About</a><a href="/feed.xml">RSS</a></span></nav></header><main><div class="diagram-page"><h1 class="diagram-title">Agent Loop</h1><div class="diagram-full"><svg xmlns="http://www.w3.org/2000/svg" width="100%" viewBox="0 0 760 220">
  <defs>
    <marker id="al-arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7a7a8e"/>
    </marker>
    <marker id="al-arr-pink" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f4569d"/>
    </marker>
  </defs>

  <!-- Gather node -->
  <rect x="40" y="30" width="200" height="90" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="140" y="68" text-anchor="middle" class="svg-heading svg-accent">Gather</text>
  <text x="140" y="92" text-anchor="middle" class="svg-sub svg-muted">Read context, scan tools</text>
  <text x="140" y="110" text-anchor="middle" class="svg-sub svg-muted">assess state</text>

  <!-- Act node -->
  <rect x="290" y="30" width="200" height="90" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="390" y="68" text-anchor="middle" class="svg-heading svg-accent">Act</text>
  <text x="390" y="92" text-anchor="middle" class="svg-sub svg-muted">Plan steps, call tools</text>
  <text x="390" y="110" text-anchor="middle" class="svg-sub svg-muted">execute</text>

  <!-- Observe node -->
  <rect x="540" y="30" width="200" height="90" rx="8" fill="#191621" stroke="rgba(14, 210, 247, 0.15)" stroke-width="1.5"/>
  <text x="640" y="68" text-anchor="middle" class="svg-heading svg-accent">Observe</text>
  <text x="640" y="92" text-anchor="middle" class="svg-sub svg-muted">Check results</text>
  <text x="640" y="110" text-anchor="middle" class="svg-sub svg-muted">decide next move</text>

  <!-- Gather → Act arrow -->
  <line x1="240" y1="75" x2="285" y2="75" stroke="#7a7a8e" stroke-width="2" marker-end="url(#al-arr)"/>

  <!-- Act → Observe arrow -->
  <line x1="490" y1="75" x2="535" y2="75" stroke="#7a7a8e" stroke-width="2" marker-end="url(#al-arr)"/>

  <!-- Observe → Gather return arrow (curves below) -->
  <path d="M 640 120 L 640 170 Q 640 190 620 190 L 160 190 Q 140 190 140 170 L 140 120"
        fill="none" stroke="#f4569d" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#al-arr-pink)"/>
  <text x="390" y="207" text-anchor="middle" class="svg-label svg-pink">repeat</text>
</svg>
</div><div class="diagram-transcript"><p>The agent loop: Gather → Act → Observe → repeat</p></div></div></main><footer><p>© 2026 <a href="https://github.com/j0a0m4" rel="noopener noreferrer" target="_blank">João Lopes</a></p><p>Theme inspired by <a href="https://github.com/bennyxguo/Obsidian-Obsidianite" rel="noopener noreferrer" target="_blank">Obsidianite</a></p></footer></body></html>
